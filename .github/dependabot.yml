version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      dev-tools:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "coverage*"
      langchain-ecosystem:
        patterns:
          - "langchain*"
          - "langgraph*"
          - "deepagents"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
